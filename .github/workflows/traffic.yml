name: Track Multi-Repo Traffic

on:
  schedule:
    - cron: '0 8 * * *'
      timezone: "Asia/Jerusalem"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Fetch traffic for all repos
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          mkdir -p traffic-data
          for repo in surf-tracker Star-Wars-Simulator Public-transport-network Google-Project; do
            gh api repos/${{ github.repository_owner }}/$repo/traffic/views > traffic-data/$repo-views.json
            gh api repos/${{ github.repository_owner }}/$repo/traffic/clones > traffic-data/$repo-clones.json
          done

      - uses: EndBug/add-and-commit@v9
        with:
          add: 'traffic-data'
          message: 'Update traffic for all repos'
          github_token: ${{ secrets.GH_ACCESS_TOKEN }}
